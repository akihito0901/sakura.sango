    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        luxury: {
                            black: '#2c4a5a', // Dark Blue
                            navy: '#4a7c96',  // Deep Blue

                    },
                    fontFamily: {

                        sans: ['Zen Kaku Gothic New', 'sans-serif'],

    </script>
    <style>
        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background-color: #fdfbf7;
        }

        h1,
        h2,
        h3,
        h4,
        .font-serif {
            font-family: 'Shippori Mincho', serif;
        }

        .gold-text {
            background: linear-gradient(to right, #B5D5E2, #f7fbfe, #B5D5E2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine-text 3s linear infinite;
        }

        @keyframes shine-text {
            to {
                background-position: 200% center;
            }
        }

        .shine-effect {
            position: relative;
            overflow: hidden;
        }

        .shine-effect::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0) 100%);
            transform: rotate(30deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% {
                left: -50%;
            }

            20% {
                left: 150%;
            }

            100% {
                left: 150%;
            }
        }

</head>

<body class="bg-[#fdfbf7] text-[#5d5c58] antialiased pb-24 md:pb-0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const FadeIn = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const domRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                        }
                    });
                }, { threshold: 0.1 });
                if (domRef.current) observer.observe(domRef.current);
                return () => {
                    if (domRef.current) observer.unobserve(domRef.current);
                };
            }, []);

            return (
                <div
                    ref={domRef}
                    className={`transition-all duration-1000 ease-out ${
                        isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'
                    }`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        const YouTubeVideo = () => (
            <div className="bg-white py-12 px-4">
                <div className="max-w-4xl mx-auto text-center">
                    <h3 className="font-serif font-bold text-xl text-[#5d5c58] mb-6">
                        実際の施術の様子をご覧ください
                    </h3>
                    <div className="aspect-w-16 aspect-h-9 w-full shadow-lg overflow-hidden relative" style={{ paddingBottom: '56.25%' }}>
                        <iframe 
                            className="absolute top-0 left-0 w-full h-full"
                            src="https://www.youtube.com/embed/N0UeZFJUCHU" 
                            title="YouTube video player" 
                            frameBorder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowFullScreen>
                        </iframe>
                    </div>
                </div>
            </div>
        );

        const Director = () => (
            <div className="bg-[#fdfbf7] py-12 px-4 border-y border-gray-100">
                <div className="max-w-4xl mx-auto">
                    <div className="text-center mb-8">
                        <h3 className="font-serif font-bold text-2xl text-[#5d5c58]">
                            院長挨拶
                        </h3>
                        <div className="w-12 h-0.5 bg-luxury-gold mx-auto mt-4"></div>
                    </div>
                    <div className="flex flex-col items-center gap-6">
                        <img src="./images/director.jpg" alt="院長" className="rounded-full w-32 h-32 object-cover shadow-lg border-4 border-luxury-gold" />
                        <div className="text-center">
                            <p className="text-sm font-bold text-luxury-navy mb-1">桜並木駅前の整骨院 院長</p>
                            <h4 className="font-serif text-2xl font-bold mb-4 tracking-wider">今坂 智和</h4>
                            <p className="text-sm text-gray-600 leading-relaxed text-justify px-2">
                                はじめまして。当院のページをご覧いただきありがとうございます。産後のママさんは、育児の疲れや身体の痛みを我慢しがちです。私たちは、そんなママさんたちが心身ともにリフレッシュし、笑顔で子育てを楽しめるよう全力でサポートいたします。お子様連れでも安心して通える環境を整えておりますので、ぜひお気軽にご相談ください。
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        );

        const VoiceCard = ({ name, attribute, title, content, stars = 5 }) => (
            <div className="bg-white p-6 rounded-lg shadow-md border-t-4 border-yellow-400 relative">
                <div className="flex justify-between items-end mb-3 border-b border-gray-100 pb-2">
                    <div className="flex items-center gap-2">
                        <span className="font-bold text-gray-700 text-sm">Google</span>
                        <div className="flex text-yellow-400 text-xs">
                            {[...Array(stars)].map((_, i) => <i key={i} className="fas fa-star"></i>)}
                        </div>
                    </div>
                    <div className="text-xs text-gray-500 font-bold text-right leading-tight">
                        <span className="block text-luxury-navy mb-0.5">{attribute}</span>
                        <span>{name}</span>
                    </div>
                </div>
                <h4 className="font-serif font-bold text-base mb-3 text-luxury-navy leading-snug">{title}</h4>
                <p className="text-sm text-gray-600 leading-7 text-justify font-sans">
                    {content}
                </p>
            </div>
        );

        const Reviews = () => {
            const data = [
                { name: "S.Sさん", attribute: "30代女性", t: "毎回赤ちゃん連れでも安心", c: "産後の腰痛で来院。施術中は先生やスタッフがお世話してくれて助かりました。説明もわかりやすいです。" },
                { name: "S.Tさん", attribute: "30代女性", t: "キッズスペース完備で助かる", c: "辛かった肩こりも一度で楽になり、体が軽くなりました。キッズスペースもあります！" },
                { name: "W.Aさん", attribute: "30代女性", t: "産後の不調が改善", c: "母の腰痛と自分の不調で通院。先生の親身な対応と清潔な院内で安心して施術を受けられます。" },
                { name: "N.Yさん", attribute: "30代女性", t: "「今までの整骨院とは違う」", c: "首の凝りと腰痛で悩んでいましたが、確実に良くなっているのを実感。継続したいと思える施術です。" },
                { name: "K.Oさん", attribute: "30代女性", t: "託児がめっちゃ助かった！", c: "上の子も連れて行けるか不安でしたが、無料の託児サービスがあって本当に助かりました。施術中はゆっくりリラックスできました。" },
                { name: "M.Iさん", attribute: "20代女性", t: "LINEで予約が簡単でよかった", c: "赤ちゃんのお世話で電話する余裕がなかったので、LINEで24時間いつでも簡単に予約できたのが本当に良かったです！" },
                { name: "Y.Hさん", attribute: "30代女性", t: "妊娠前のズボンが履けました", c: "産後どうしても骨盤周りが戻らず悩んでいましたが、通い始めてからスッと履けるようになり感動しています。" },
                { name: "A.Kさん", attribute: "40代女性", t: "腰の痛みがスッキリ", c: "抱っこのしすぎで腰が限界でしたが、一度の施術でかなり楽になりました。先生も優しくて話しやすいです。" },
                { name: "E.Mさん", attribute: "30代女性", t: "丁寧なカウンセリングで安心", c: "今の体の状態をしっかり説明してくれて、納得して施術を受けることができました。これからもお世話になります。" },
            ];

            return (
                <div className="bg-yellow-50 pb-16">
                    <div className="max-w-4xl mx-auto">
                        <div className="mb-10">
                            <img src="./images/reviews-title.png" alt="リアルなお声をご紹介！" className="w-full h-auto block drop-shadow-sm" />
                        </div>
                        <div className="grid grid-cols-1 gap-6 px-4">
                            {data.map((d, idx) => (
                                <FadeIn key={idx} delay={idx * 150}>
                                    <VoiceCard name={d.name} attribute={d.attribute} title={d.t} content={d.c} />
                                </FadeIn>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const StickyCTA = () => (
            <div className="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur border-t border-gray-200 p-3 shadow-[0_-5px_20px_-5px_rgba(0,0,0,0.1)] z-50 flex justify-center">
                <a href="https://lin.ee/NaWIq1n" onClick={() => window.fbq('track', 'Lead', {content_name: 'LINE友だち追加'})} className="block w-full max-w-md bg-gradient-to-r from-green-400 to-green-500 text-white font-bold text-lg py-3 rounded-full shadow-lg text-center shine-effect transition-transform active:scale-95">
                    <span className="flex items-center justify-center gap-2">
                        <i className="fab fa-line text-xl"></i>
                        <span className="drop-shadow-sm text-lg">簡単30秒で予約</span>
                    </span>
                </a>
            </div>
        );

        const App = () => {
            return (
                <div className="w-full max-w-md mx-auto shadow-2xl bg-white min-h-screen relative font-sans overflow-hidden">
                    <FadeIn>
                        <img src="./images/img1.png" className="w-full h-auto block" alt="LP画像1" />
                    </FadeIn>
                    <FadeIn>
                        <img src="./images/img2.jpeg" className="w-full h-auto block" alt="LP画像2" />
                    </FadeIn>
                    <FadeIn>
                        <img src="./images/img3.jpeg" className="w-full h-auto block" alt="LP画像3" />
                    </FadeIn>
                    <FadeIn>
                        <img src="./images/img4.jpeg" className="w-full h-auto block" alt="LP画像4" />
                    </FadeIn>
                    <FadeIn>
                        <img src="./images/img5.jpeg" className="w-full h-auto block" alt="LP画像5" />
                    </FadeIn>
                    <FadeIn>
                        <img src="./images/img6.png" className="w-full h-auto block" alt="LP画像6" />
                    </FadeIn>
                    
                    {/* 動画と院長挨拶 */}
                    <FadeIn>
                        <YouTubeVideo />
                    </FadeIn>
                    <FadeIn>
                        <Director />
                    </FadeIn>

                    {/* 最後の画像の後に口コミ */}
                    <Reviews />
                    
                    <div className="pb-24"></div> {/* Sticky CTAが被らないための余白 */}
                    <StickyCTA />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
